<!DOCTYPE html>
<html>

<head>

<title>Gautam Assistant AI</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

.container{
max-width:900px;
margin:30px auto;
padding:20px;
}

h1{
text-align:center;
}

#chat{
height:450px;
overflow-y:auto;
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.message{
background:#374151;
padding:12px;
margin:10px 0;
border-radius:10px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Gautam Assistant AI</h1>

<div id="chat">

<div class="message">

🤖 Hello! Main Gautam Assistant AI hoon.

</div>

</div>

<div class="input-box">

<input id="msg" placeholder="Type a message">

<button onclick="send()">

Send

</button>

</div>

</div>

<script>

function send(){

let text=document.getElementById("msg").value.toLowerCase().trim();

if(text=="") return;

let reply="🤔 Mujhe abhi iska answer nahi pata.";

if(text.includes("hello") || text.includes("hi")){

reply="👋 Hello!";

}

else if(text.includes("kaise ho")){

reply="😊 Main theek hoon.";

}

else if(text.includes("time")){

reply="🕒 "+new Date().toLocaleTimeString();

}

document.getElementById("chat").innerHTML +=

'<div class="message">🧑 '+text+'</div>';

document.getElementById("chat").innerHTML +=

'<div class="message">🤖 '+reply+'</div>';

document.getElementById("msg").value="";

}

</script>

</body>

</html>
