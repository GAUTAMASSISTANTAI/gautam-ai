<!DOCTYPE html>
<html>

<head>

<title>Gautam Assistant AI</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

h1{
text-align:center;
font-size:50px;
}

#chat{
height:450px;
overflow-y:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.message{
background:#334155;
padding:15px;
border-radius:12px;
margin:10px 0;
font-size:18px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Gautam Assistant AI</h1>

<div id="chat">

<div class="message">
🤖 Hello! Main Gautam Assistant AI hoon.
</div>

</div>

<div class="input-box">

<input id="msg" placeholder="Type a message">

<button onclick="send()">

Send

</button>

</div>

</div>

<script>

function send(){

let text=document.getElementById("msg").value.toLowerCase();

if(text=="") return;

let reply="🤔 Mujhe abhi iska answer nahi pata.";

if(text.includes("hello") || text.includes("hi")){

reply="👋 Hello! Aap kaise ho?";

}

else if(text.includes("kaise ho")){

reply="😊 Main theek hoon.";

}

else if(text.includes("time")){

reply="🕒 "+new Date().toLocaleTimeString();

}

else if(text.includes("date")){

reply="📅 "+new Date().toDateString();

}

else if(text.includes("math")){

reply="➕ Maths ka question puchho.";

}

else if(text.includes("science")){

reply="🔬 Science ka question puchho.";

}

else if(text.includes("joke")){

reply="😂 Teacher: Homework kahan hai? Student: Sir, network issue tha.";

}

document.getElementById("chat").innerHTML +=

'<div class="message">🧑 '+text+'</div>';

document.getElementById("chat").innerHTML +=

'<div class="message">🤖 '+reply+'</div>';

document.getElementById("msg").value="";

}

</script>

</body>

</html>
