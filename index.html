<!DOCTYPE html>
<html>

<head>

<title>Gautam Assistant AI</title>

<style>

body{
background:#111827;
font-family:Arial,sans-serif;
color:white;
margin:0;
}

.container{
width:80%;
max-width:800px;
margin:30px auto;
}

h1{
text-align:center;
font-size:45px;
}

#chat{
height:400px;
overflow-y:auto;
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.message{
background:#374151;
padding:12px;
margin:10px 0;
border-radius:10px;
font-size:20px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Gautam Assistant AI</h1>

<div id="chat"></div>

<div class="input-box">

<input id="msg" placeholder="Type a message...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

function send(){

let text=document.getElementById("msg").value.toLowerCase();

if(text=="") return;

let reply="🤔 Mujhe abhi iska answer nahi pata.";

if(text=="hello" || text=="hi"){

reply="👋 Hello! Aap kaise ho?";

}

else if(text=="kaise ho" || text=="kya haal hai"){

reply="😊 Main theek hoon. Aap kaise ho?";

}

else if(text=="tum kaun ho"){

reply="🤖 Main Gautam Assistant AI hoon.";

}

else if(text=="time"){

reply="🕒 "+new Date().toLocaleTimeString();

}

else if(text=="date"){

reply="📅 "+new Date().toDateString();

}

else if(text=="thank you"){

reply="🙏 Welcome!";

}

else if(text=="bye"){

reply="👋 Bye!";

}

document.getElementById("chat").innerHTML +=
'<div class="message">🧑 '+text+'</div>';

document.getElementById("chat").innerHTML +=
'<div class="message">🤖 '+reply+'</div>';

document.getElementById("msg").value="";

}

</script>

</body>

</html>
