<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gautam Assistant AI</title>

<style>

body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

h1{
text-align:center;
}

#chat{
height:400px;
background:#1e293b;
padding:15px;
border-radius:12px;
overflow-y:auto;
margin-bottom:15px;
}

.user{
background:#2563eb;
padding:10px;
margin:10px 0;
border-radius:10px;
text-align:right;
}

.bot{
background:#334155;
padding:10px;
margin:10px 0;
border-radius:10px;
}

input{
width:75%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
padding:15px 20px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🤖 Gautam Assistant AI</h1>

<div id="chat">

<div class="bot">

👋 Hello! Main Gautam Assistant AI hoon.

</div>

</div>

<input id="msg" placeholder="Type here">

<button onclick="send()">Send</button>

<script>

function send(){

let text=document.getElementById("msg").value.toLowerCase().trim();

if(text=="") return;

let reply="🤔 Mujhe abhi iska answer nahi pata.";

if(text.includes("hello") || text.includes("hi")){

reply="👋 Hello!";

}

else if(text.includes("how are you")){

reply="😊 I am fine. How are you?";

}

if(text.includes("ka hal ba ") || text.includes("thik ba nu ")){

reply="👋 mai theek hu ( aap kaise ho ) !";

}

else if(text.includes("kaise ho")){

reply="😊 Main theek hoon. Tum kaise ho?";

}

else if(text.includes("kya hal hai") || text.includes("kya haal hai")){

reply="😊 Main bilkul theek hoon.";

}

else if(text=="2+2"){

reply="4";

}

else if(text=="5+5"){

reply="10";

}

else if(text=="10+10"){

reply="20";

}

else if(text=="12*12"){

reply="144";

}

else if(text.includes("time")){

reply="🕒 "+new Date().toLocaleTimeString();

}

else if(text.includes("date")){

reply="📅 "+new Date().toDateString();

}

else if(text.includes("joke")){

reply="😂 Teacher: Homework kahan hai? Student: Sir network issue tha.";

}

else if(text.includes("thank you")){

reply="😊 You're welcome!";

}
else if(text.includes("who are you")){

reply="😊 Mai ek AI hu ";
}

else if(text.includes("bye")){

reply="👋 Bye!";

}

document.getElementById("chat").innerHTML +=

'<div class="user">🧑 '+text+'</div>';

document.getElementById("chat").innerHTML +=

'<div class="bot">🤖 '+reply+'</div>';

document.getElementById("msg").value="";

document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;

}

</script>

</body>

</html>
