<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gautam Assistant AI</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.container{
max-width:900px;
margin:20px auto;
padding:20px;
}

h1{
text-align:center;
}

#chat{
height:450px;
overflow-y:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.user{
background:#2563eb;
padding:12px;
margin:10px 0;
border-radius:10px;
text-align:right;
}

.bot{
background:#334155;
padding:12px;
margin:10px 0;
border-radius:10px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Gautam Assistant AI</h1>

<div id="chat">

<div class="bot">

👋 Namaste! Main Gautam Assistant AI hoon.

</div>

</div>

<div class="input-box">

<input id="msg" placeholder="Type your message">

<button onclick="send()">

Send

</button>

</div>

</div>

<script>

function send(){

let text=document.getElementById("msg").value
.toLowerCase()
.trim();

if(text=="") return;

let reply="🤔 Mujhe abhi iska answer nahi pata.";

if(text.includes("hello") || text.includes("hi")){

reply="👋 Hello!";

}

else if(text.includes("kaise ho")){

reply="😊 Main theek hoon. Aap kaise ho?";

}

else if(text.includes("kya haal hai")){

reply="😊 Main bilkul theek hoon.";

}

else if(text.includes("tum kaun ho")){

reply="🤖 Main Gautam Assistant AI hoon.";

}

else if(text.includes("thank you")){

reply="😊 Aapka swagat hai.";

}

else if(text.includes("joke")){

reply="😂 Teacher: Homework kahan hai? Student: Sir network issue tha.";

}

else if(text.includes("time")){

reply="🕒 "+new Date().toLocaleTimeString();

}

else if(text.includes("date")){

reply="📅 "+new Date().toDateString();

}

else if(text.includes("good morning")){

reply="☀️ Good morning!";

}

else if(text.includes("good night")){

reply="🌙 Good night!";

}

else if(text.includes("math")){

reply="➕ Maths ka question puchho.";

}

else if(text.includes("science")){

reply="🔬 Science ka question puchho.";

}

else if(text.includes("school")){

reply="🏫 Roz school jao aur padhai karo.";

}

else if(text.includes("study")){

reply="📚 Roz revision karo.";

}

else if(text.includes("motivate")){

reply="💪 Kabhi haar mat mano.";

}

else if(text.includes("bye")){

reply="👋 Bye! Phir milenge.";

}

document.getElementById("chat").innerHTML +=
'<div class="user">🧑 '+text+'</div>';

document.getElementById("chat").innerHTML +=
'<div class="bot">🤖 '+reply+'</div>';

document.getElementById("msg").value="";

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

}

</script>

</body>

</html>
